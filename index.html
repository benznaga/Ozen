<!DOCTYPE html>
<html>
<head>
  <title>OZEN Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
    }

    .container {
      padding: 20px;
    }

    .hidden {
      display: none;
    }
    #home {
  text-align: center;
  margin-top: 100px;
}

button {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:first-of-type {
  background: #2ecc71;
  color: white;
}

button:last-of-type {
  background: #3498db;
  color: white;
}
    button {
  display: block;
  width: 80%;
  margin: 12px auto;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}
    .features-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
    }
    .card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <img src="logo.png" style="width:120px; margin-bottom:20px;">
    <h1 style="font-size:22px; font-weight:500; color:#333;">
  Learn Better.<br>Achieve Greater.
</h1>
    
<p style="color:#777; font-size:14px;">
  Smart Micro-learning for Classes 8–12
</p>
    <button onclick="show('dashboard')">
      I am a Student
    </button>
    <button onclick="show('teacher')">
  I am a Teacher
    </button>
  
    <div class="features-grid">
<div class="features-grid">

  <div class="card">
    📘<br>
    <b>Concept First</b><br>
    <small>Stories & examples</small>
  </div>

  <div class="card">
    🧠<br>
    <b>Think Deep</b><br>
    <small>Understand concepts</small>
  </div>

  <div class="card">
    🎯<br>
    <b>Practice</b><br>
    <small>Quizzes & tests</small>
  </div>

  <div class="card">
    🏆<br>
    <b>Earn XP</b><br>
    <small>Track progress</small>
  </div>

</div>
</div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2>Dashboard</h2>
    <p>This is dashboard</p>
  </div>

</div>

<script>
function show(id){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("dashboard").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
