<!DOCTYPE html>
<html>
<head>
  <title>OZEN Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f3f6f9;
    }

    .container {
      padding: 20px;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-weight: bold;
      color: #2ecc71;
    }

    .nav-links {
      font-size: 14px;
      color: #666;
    }

    .nav-links span {
      margin-left: 10px;
    }

    .active {
      color: #2ecc71;
      font-weight: bold;
    }

    /* HERO CARD */
    .hero {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .tag {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    .highlight {
      color: #2ecc71;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    /* BUTTONS */
    .btn {
      display: block;
      width: 90%;
      margin: 12px auto;
      padding: 15px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    .green {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
    }

    .blue {
      background: linear-gradient(45deg, #3498db, #2980b9);
    }

    /* FEATURES */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 25px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .card small {
      color: #777;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      OZEN<br>Learning
    </div>

    <div class="nav-links">
      <span class="active">Home</span>
      <span>Courses</span>
      <span>Practice</span>
      <span>Progress</span>
      <span>Leaderboard</span>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">

    <div class="tag">⚡ Micro Learning</div>

    <h1>
      Learn Better.<br>
      <span class="highlight">Achieve Greater.</span>
    </h1>

    <p class="subtitle">
      Your smart learning app for Classes 8–12
    </p>

    <button class="btn green">🎓 I am a Student</button>
    <button class="btn blue">👨‍🏫 I am a Teacher</button>

  </div>

  <!-- FEATURES -->
  <div class="features-grid">

    <div class="card">
      📘<br>
      <b>Concept First</b><br>
      <small>Stories & examples</small>
    </div>

    <div class="card">
      🧠<br>
      <b>Think Deep</b><br>
      <small>Understand concepts</small>
    </div>

    <div class="card">
      🎯<br>
      <b>Practice</b><br>
      <small>Quizzes & tests</small>
    </div>

    <div class="card">
      🏆<br>
      <b>Earn XP</b><br>
      <small>Track progress</small>
    </div>

  </div>

</div>

</body>
</html>
