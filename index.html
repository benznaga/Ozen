<!DOCTYPE html>
<html>
<head>
  <title>OZEN Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
    }

    .container {
      padding: 20px;
    }

    .hidden {
      display: none;
    }
    #home {
  text-align: center;
  margin-top: 100px;
}

button {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:first-of-type {
  background: #2ecc71;
  color: white;
}

button:last-of-type {
  background: #3498db;
  color: white;
}
  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <img src="logo.png" style="height:50px;">
    <p>Learn Better. Achieve Greater.</p>

    <button onclick="show('dashboard')">
      I am a Student
    </button>
    <button onclick="show('teacher')">
  I am a Teacher
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2>Dashboard</h2>
    <p>This is dashboard</p>
  </div>

</div>

<script>
function show(id){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("dashboard").classList.add("hidden");

  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
